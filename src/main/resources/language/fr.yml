definitions:

  body-parts:

    # Used in command responses ({Part})
    HEAD: 'tête'
    TORSO: 'corps'
    ARM_LEFT: 'bras gauche'
    ARM_RIGHT: 'bras droit'
    LEG_LEFT: 'jambe gauche'
    LEG_RIGHT: 'jambe droite'
    FOOT_LEFT: 'pied gauche'
    FOOT_RIGHT: 'pied droit'

  body-part-states:

    # Used in PAPI placeholders
    FULL: 'sain'
    NEARLYFULL: 'léger'
    INTERMEDIATE: 'modéré'
    DAMAGED: 'grave'
    BROKEN: 'cassé'

commands:

  bodyhealth:

    # Message shown for incorrect command usage
    usage: '&bUtilisation : /bodyhealth <commande>'

    # Message shown for invalid subcommands
    invalid: '&cCommande invalide. Veuillez utiliser une commande valide.'

    # Message shown if a command is player-only but used from the console
    player-only: '&cCette commande ne peut être exécutée que par les joueurs.'

    # Message shown if the player lacks permission for a command
    not-permitted: '&cVous n''avez pas la permission d''utiliser cette commande.'

    add:

      # Message shown for incorrect command usage
      usage: '&bUtilisation : /bodyhealth add [joueur] [partie du corps] <valeur>'

      # Message shown when no valid target player could be retrieved
      no-target: '&cVeuillez fournir un joueur cible si vous exécutez cette commande depuis la console.'

      # Message shown if the value provided is invalid
      invalid-value: '&cValeur de santé invalide : "{Value}".'

      # Message shown on successful health update (all parts)
      success-all: '&aVous avez ajouté {Value} à toutes les parties du corps de {Player}.'

      # Message shown on successful health update (given part)
      success-single: '&aVous avez ajouté {Value} à {Player}''s {Part}.'

    get:

      # Message shown for incorrect command usage
      usage: '&bUtilisation : /bodyhealth get [joueur] [partie du corps]'

      # Message shown when no valid target player could be retrieved
      no-target: '&cVeuillez fournir un joueur cible si vous exécutez cette commande depuis la console.'

      # Message shown on successful health retrieval (all parts)
      success-all: "&aSanté du corps de {Player} :\n&e&lTête &8&l» &a{Health_HEAD}%\n&e&lCorps &8&l» &a{Health_TORSO}%\n&e&lBras gauche &8&l» &a{Health_ARM_LEFT}%\n&e&lBras droit &8&l» &a{Health_ARM_RIGHT}%\n&e&lJambe gauche &8&l» &a{Health_LEG_LEFT}%\n&e&lJambe droite &8&l» &a{Health_LEG_RIGHT}%\n&e&lPied gauche &8&l» &a{Health_FOOT_LEFT}%\n&e&lPied droit &8&l» &a{Health_FOOT_RIGHT}%"

      # Message shown on successful health retrieval (given part)
      success-single: '&aLa santé de {Player} pour {Part} est de {Health}%.'

    heal:

      # Message shown for incorrect command usage
      usage: '&bUtilisation : /bodyhealth set [joueur] [partie du corps] <valeur>'

      # Message shown when no valid target player could be retrieved
      no-target: '&cVeuillez fournir un joueur cible si vous exécutez cette commande depuis la console.'

      # Message shown on successful healing
      success-all: '&a{Player} a été complètement soigné.'

      # Message shown on successful healing
      success-single: '&aLa {Part} de {Player} a été complètement soignée.'

    reload:

      # Message shown on successful configuration reload
      success: '&aConfiguration rechargée avec succès.'

      # Message shown if reload fails
      fail: '&cLa configuration n''a pas pu être rechargée.'

    set:

      # Message shown for incorrect command usage
      usage: '&bUtilisation : /bodyhealth set [joueur] [partie du corps] <valeur>'

      # Message shown when no valid target player could be retrieved
      no-target: '&cVeuillez fournir un joueur cible si vous exécutez cette commande depuis la console.'

      # Message shown if the value provided is invalid
      invalid-value: '&cValeur de santé invalide : "{Value}".'

      # Message shown on successful health update (all parts)
      success-all: '&aVous avez défini toutes les parties du corps de {Player} à {Value}.'

      # Message shown on successful health update (given part)
      success-single: '&aVous avez défini {Player}''s {Part} à {Value}.'

    data:

      # Message shown for incorrect command usage
      usage: '&bUtilisation : /bodyhealth data <save/dump/erase/move> [...]'

      save:

        # Message shown on successful save
        success: '&aToutes les données pour {Count} joueur(s) en ligne ont été enregistrées avec succès.'

      dump:

        # Message shown for incorrect command usage (dump)
        usage: '&bUtilisation : /bodyhealth data dump <type de stockage>'

        # Message shown on dump start
        start: '&aCollecte et exportation des données depuis le stockage {Type} de BodyHealth...'

        # Message shown on successful dump
        success: '&aLes données de {Count} joueur(s) ont été exportées avec succès depuis le stockage {Type} de BodyHealth vers {File}.'

        # Message shown if dumping data fails
        fail: '&cÉchec de l’exportation des données existantes depuis le stockage {Type} de BodyHealth.'

      erase:

        # Message shown for incorrect command usage (erase)
        usage: '&bUtilisation : /bodyhealth data erase <type de stockage>'

        # Message used to confirm the erase command
        confirmation: '&c&lAVERTISSEMENT : &r&cVous êtes sur le point d’effacer toutes les données existantes du stockage {Type} de BodyHealth !<br> &ePour continuer, veuillez retaper cette commande.'

        # Message shown on erase start
        start: '&aSuppression de toutes les données du stockage {Type} de BodyHealth...'

        # Message shown on successful erase
        success: '&aToutes les données du stockage {Type} de BodyHealth ont été supprimées avec succès.'

        # Message shown if erasing data fails
        fail: '&cÉchec de la suppression de toutes les données du stockage {Type} de BodyHealth.'

      move:

        # Message shown for incorrect command usage (move)
        usage: '&bUtilisation : /bodyhealth data move <type de stockage> <type de stockage>'

        # Message used to confirm the move command
        confirmation: '&c&lAVERTISSEMENT : &r&cVous êtes sur le point de déplacer toutes les données du stockage {Type1} vers le stockage {Type2} de BodyHealth, ce qui peut écraser des données existantes !<br> &ePour continuer, veuillez retaper cette commande.'

        # Message shown on move start
        start: '&aDéplacement des données du stockage {Type1} vers le stockage {Type2} de BodyHealth...'

        # Message shown on successful move
        success: '&aLes données de {Count} joueur(s) ont été déplacées avec succès du stockage {Type1} vers le stockage {Type2} de BodyHealth.'

        # Message shown if moving data fails
        fail: '&cÉchec du déplacement de toutes les données existantes du stockage {Type1} vers le stockage {Type2} de BodyHealth.'


    addon:

      # Message shown for incorrect command usage
      usage: '&bUsage : /bodyhealth addon <list/info/enable/disable/reload/load/unload>'

      # Message shown when the specified addon could not be found
      not-found: '&cAddon "{Addon}" introuvable.'

      list:

        # Header shown before listing addons
        header: '&bAddons chargés ({Count}) : '

        # Separator between addon name entries
        separator: '&7, '

        # Entry format for enabled addons
        entry-enabled: '&a{Name}'

        # Entry format for disabled addons
        entry-disabled: '&c{Name}'

        # Message shown when no addons are loaded
        none: '&7Aucun addon chargé.'

      info:

        # Message shown for incorrect command usage
        usage: '&bUsage : /bodyhealth addon info <addon>'

        # Message shown to display addon information
        display: "&bInformations sur l''addon &f{Name}&b:\n&bDescription : &f{Description}\n&bAuteur : &f{Author}\n&bVersion : &f{Version}\n&bStatut : {Status}"

        # Label for an enabled addon status
        status-enabled: '&aActivé'

        # Label for a disabled addon status
        status-disabled: '&cDésactivé'

      enable:

        # Message shown for incorrect command usage
        usage: '&bUsage : /bodyhealth addon enable <addon>'

        # Message shown if the addon is already enabled
        already-enabled: '&cL''addon "{Addon}" est déjà activé.'

        # Message shown on successful enable
        success: '&aL''addon "{Addon}" a été activé.'

        # Message shown if enabling fails
        fail: '&cImpossible d''activer l''addon "{Addon}".'

      disable:

        # Message shown for incorrect command usage
        usage: '&bUsage : /bodyhealth addon disable <addon>'

        # Message shown if the addon is already disabled
        already-disabled: '&cL''addon "{Addon}" est déjà désactivé.'

        # Message shown on successful disable
        success: '&aL''addon "{Addon}" a été désactivé.'

        # Message shown if disabling fails
        fail: '&cImpossible de désactiver l''addon "{Addon}".'

      reload:

        # Message shown for incorrect command usage
        usage: '&bUsage : /bodyhealth addon reload <addon>'

        # Message shown on successful reload
        success: '&aL''addon "{Addon}" a été rechargé.'

        # Message shown if reloading fails
        fail: '&cImpossible de recharger l''addon "{Addon}".'

      load:

        # Message shown for incorrect command usage
        usage: '&bUsage : /bodyhealth addon load <fichier>'

        # Message shown when the specified addon file could not be found
        not-found: '&cFichier d''addon "{File}" introuvable dans le dossier addons.'

        # Warning shown before loading an addon post onLoad (requires confirmation)
        warning: '&c&lATTENTION : &r&cLe chargement manuel des addons peut ne pas être pris en charge par tous les addons !<br> &ePour continuer, veuillez retaper cette commande.'

        # Message shown if the addon is already loaded
        already-loaded: '&cL''addon de "{File}" est déjà chargé.'

        # Message shown on successful load
        success: '&aL''addon de "{File}" a été chargé avec succès.'

        # Message shown if loading fails
        fail: '&cImpossible de charger l''addon depuis "{File}".'

      unload:

        # Message shown for incorrect command usage
        usage: '&bUsage : /bodyhealth addon unload <addon>'

        # Warning shown before unloading an addon (requires confirmation)
        warning: '&c&lATTENTION : &r&cLe déchargement manuel des addons peut ne pas être pris en charge par tous les addons !<br> &ePour continuer, veuillez retaper cette commande.'

        # Message shown on successful unload
        success: '&aL''addon "{Addon}" a été déchargé avec succès.'

        # Message shown if unloading fails
        fail: '&cImpossible de décharger l''addon "{Addon}".'

    debug:

      # Message shown for incorrect command usage
      usage: '&bUtilisation : /bodyhealth debug <dump/toggle> [...]'

      dump:

        # Message shown on dump start
        start: '&aCollecte et exportation des informations de débogage...'

        # Message shown on successful dump
        success: '&aLes informations de débogage ont été exportées avec succès vers {File}.'

        # Message shown if dumping data fails
        fail: '&cÉchec de l’exportation des informations de débogage !'

      toggle:

        # Message shown for toggling on debug mode
        normal-on: '&aMode débogage activé.'

        # Message shown for toggling off debug mode
        normal-off: '&aMode débogage désactivé.'

        # Message shown for toggling on verbose (development) mode
        verbose-on: '&aMode développement activé.'

        # Message shown for toggling off verbose (development) mode
        verbose-off: '&aMode développement désactivé.'