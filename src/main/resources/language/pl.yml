definitions:

  body-parts:

    # Used in command responses ({Part})
    HEAD: 'głowa'
    TORSO: 'ciało'
    ARM_LEFT: 'lewa ręka'
    ARM_RIGHT: 'prawa ręka'
    LEG_LEFT: 'lewa noga'
    LEG_RIGHT: 'prawa noga'
    FOOT_LEFT: 'lewa stopa'
    FOOT_RIGHT: 'prawa stopa'

  body-part-states:

    # Used in PAPI placeholders
    FULL: 'zdrowy'
    NEARLYFULL: 'lekko ranny'
    INTERMEDIATE: 'średnio ranny'
    DAMAGED: 'ciężko ranny'
    BROKEN: 'złamany'

commands:

  bodyhealth:

    # Message shown for incorrect command usage
    usage: '&bUżycie: /bodyhealth <komenda>'

    # Message shown for invalid subcommands
    invalid: '&cNieprawidłowa akcja. Proszę użyć prawidłowej komendy.'

    # Message shown if a command is player-only but used from the console
    player-only: '&cTa komenda może być użyta tylko przez graczy.'

    # Message shown if the player lacks permission for a command
    not-permitted: '&cNie masz uprawnień do używania tej komendy.'

    add:

      # Message shown for incorrect command usage
      usage: '&bUżycie: /bodyhealth add [gracz] [część ciała] <wartość>'

      # Message shown when no valid target player could be retrieved
      no-target: '&cProszę podać gracza, gdy używasz tej komendy z konsoli.'

      # Message shown if the value provided is invalid
      invalid-value: '&cNieprawidłowa wartość zdrowia: "{Value}".'

      # Message shown on successful health update (all parts)
      success-all: '&aPomyślnie dodano {Value} do wszystkich części ciała gracza {Player}.'

      # Message shown on successful health update (given part)
      success-single: '&aPomyślnie dodano {Value} do {Player}''s {Part}.'

    get:

      # Message shown for incorrect command usage
      usage: '&bUżycie: /bodyhealth get [gracz] [część ciała]'

      # Message shown when no valid target player could be retrieved
      no-target: '&cProszę podać gracza, gdy używasz tej komendy z konsoli.'

      # Message shown on successful health retrieval (all parts)
      success-all: "&aZdrowie ciała gracza {Player}:\n&e&lGłowa &8&l» &a{Health_HEAD}%\n&e&lCiało &8&l» &a{Health_TORSO}%\n&e&lLewa ręka &8&l» &a{Health_ARM_LEFT}%\n&e&lPrawa ręka &8&l» &a{Health_ARM_RIGHT}%\n&e&lLewa noga &8&l» &a{Health_LEG_LEFT}%\n&e&lPrawa noga &8&l» &a{Health_LEG_RIGHT}%\n&e&lLewa stopa &8&l» &a{Health_FOOT_LEFT}%\n&e&lPrawa stopa &8&l» &a{Health_FOOT_RIGHT}%"

      # Message shown on successful health retrieval (given part)
      success-single: '&aZdrowie {Player}''s {Part} to {Health}%.'

    heal:

      # Message shown for incorrect command usage
      usage: '&bUżycie: /bodyhealth set [gracz] [część ciała] <wartość>'

      # Message shown when no valid target player could be retrieved
      no-target: '&cProszę podać gracza, gdy używasz tej komendy z konsoli.'

      # Message shown on successful healing
      success-all: '&a{Player} został w pełni wyleczony.'

      # Message shown on successful healing
      success-single: '&aPomyślnie wyleczono {Player}''s {Part}.'

    reload:

      # Message shown on successful configuration reload
      success: '&aKonfiguracja została pomyślnie przeładowana.'

      # Message shown if reload fails
      fail: '&cNie udało się przeładować konfiguracji.'

    set:

      # Message shown for incorrect command usage
      usage: '&bUżycie: /bodyhealth set [gracz] [część ciała] <wartość>'

      # Message shown when no valid target player could be retrieved
      no-target: '&cProszę podać gracza, gdy używasz tej komendy z konsoli.'

      # Message shown if the value provided is invalid
      invalid-value: '&cNieprawidłowa wartość zdrowia: "{Value}".'

      # Message shown on successful health update (all parts)
      success-all: '&aPomyślnie ustawiono wszystkie części ciała {Player} na {Value}.'

      # Message shown on successful health update (given part)
      success-single: '&aPomyślnie ustawiono {Player}''s {Part} na {Value}.'

    data:

      # Message shown for incorrect command usage
      usage: '&bUżycie: /bodyhealth data <save/dump/erase/move> [...]'

      save:

        # Message shown on successful save
        success: '&aPomyślnie zapisano wszystkie dane dla {Count} gracza(-y) online.'

      dump:

        # Message shown for incorrect command usage (dump)
        usage: '&bUżycie: /bodyhealth data dump <typ magazynu>'

        # Message shown on dump start
        start: '&aZbieranie i eksportowanie danych z magazynu {Type} BodyHealth...'

        # Message shown on successful dump
        success: '&aDane {Count} gracza(-y) zostały pomyślnie wyeksportowane z magazynu {Type} BodyHealth do {File}.'

        # Message shown if dumping data fails
        fail: '&cNie udało się wyeksportować istniejących danych z magazynu {Type} BodyHealth.'

      erase:

        # Message shown for incorrect command usage (erase)
        usage: '&bUżycie: /bodyhealth data erase <typ magazynu>'

        # Message used to confirm the erase command
        confirmation: '&c&lOSTRZEŻENIE: &r&cZamierzasz usunąć wszystkie istniejące dane z magazynu {Type} BodyHealth!<br> &eAby kontynuować, wpisz ponownie tę komendę.'

        # Message shown on erase start
        start: '&aUsuwanie wszystkich danych z magazynu {Type} BodyHealth...'

        # Message shown on successful erase
        success: '&aWszystkie dane z magazynu {Type} BodyHealth zostały pomyślnie usunięte.'

        # Message shown if erasing data fails
        fail: '&cNie udało się usunąć wszystkich danych z magazynu {Type} BodyHealth.'

      move:

        # Message shown for incorrect command usage (move)
        usage: '&bUżycie: /bodyhealth data move <typ magazynu> <typ magazynu>'

        # Message used to confirm the move command
        confirmation: '&c&lOSTRZEŻENIE: &r&cZamierzasz przenieść wszystkie dane z magazynu {Type1} do magazynu {Type2} BodyHealth, co może nadpisać istniejące dane!<br> &eAby kontynuować, wpisz ponownie tę komendę.'

        # Message shown on move start
        start: '&aPrzenoszenie danych z magazynu {Type1} do magazynu {Type2} BodyHealth...'

        # Message shown on successful move
        success: '&aDane {Count} gracza(-y) zostały pomyślnie przeniesione z magazynu {Type1} do magazynu {Type2} BodyHealth.'

        # Message shown if moving data fails
        fail: '&cNie udało się przenieść istniejących danych z magazynu {Type1} do magazynu {Type2} BodyHealth.'


    addon:

      # Message shown for incorrect command usage
      usage: '&bUżycie: /bodyhealth addon <list/info/enable/disable/reload/load/unload>'

      # Message shown when the specified addon could not be found
      not-found: '&cAddon "{Addon}" nie został znaleziony.'

      list:

        # Header shown before listing addons
        header: '&bZaładowane Addony ({Count}): '

        # Separator between addon name entries
        separator: '&7, '

        # Entry format for enabled addons
        entry-enabled: '&a{Name}'

        # Entry format for disabled addons
        entry-disabled: '&c{Name}'

        # Message shown when no addons are loaded
        none: '&7Brak załadowanych addonów.'

      info:

        # Message shown for incorrect command usage
        usage: '&bUżycie: /bodyhealth addon info <addon>'

        # Message shown to display addon information
        display: "&bInformacje o addonie &f{Name}&b:\n&bOpis: &f{Description}\n&bAutor: &f{Author}\n&bWersja: &f{Version}\n&bStatus: {Status}"

        # Label for an enabled addon status
        status-enabled: '&aWłączony'

        # Label for a disabled addon status
        status-disabled: '&cWyłączony'

      enable:

        # Message shown for incorrect command usage
        usage: '&bUżycie: /bodyhealth addon enable <addon>'

        # Message shown if the addon is already enabled
        already-enabled: '&cAddon "{Addon}" jest już włączony.'

        # Message shown on successful enable
        success: '&aAddon "{Addon}" został włączony.'

        # Message shown if enabling fails
        fail: '&cNie udało się włączyć addona "{Addon}".'

      disable:

        # Message shown for incorrect command usage
        usage: '&bUżycie: /bodyhealth addon disable <addon>'

        # Message shown if the addon is already disabled
        already-disabled: '&cAddon "{Addon}" jest już wyłączony.'

        # Message shown on successful disable
        success: '&aAddon "{Addon}" został wyłączony.'

        # Message shown if disabling fails
        fail: '&cNie udało się wyłączyć addona "{Addon}".'

      reload:

        # Message shown for incorrect command usage
        usage: '&bUżycie: /bodyhealth addon reload <addon>'

        # Message shown on successful reload
        success: '&aAddon "{Addon}" został przeładowany.'

        # Message shown if reloading fails
        fail: '&cNie udało się przeładować addona "{Addon}".'

      load:

        # Message shown for incorrect command usage
        usage: '&bUżycie: /bodyhealth addon load <plik>'

        # Message shown when the specified addon file could not be found
        not-found: '&cPlik addona "{File}" nie został znaleziony w katalogu addons.'

        # Warning shown before loading an addon post onLoad (requires confirmation)
        warning: '&c&lOSTRZEŻENIE: &r&cRęczne ładowanie addonów może nie być obsługiwane przez każdy addon!<br> &eAby kontynuować, wpisz ponownie to polecenie.'

        # Message shown if the addon is already loaded
        already-loaded: '&cAddon z "{File}" jest już załadowany.'

        # Message shown on successful load
        success: '&aAddon z "{File}" został pomyślnie załadowany.'

        # Message shown if loading fails
        fail: '&cNie udało się załadować addona z "{File}".'

      unload:

        # Message shown for incorrect command usage
        usage: '&bUżycie: /bodyhealth addon unload <addon>'

        # Warning shown before unloading an addon (requires confirmation)
        warning: '&c&lOSTRZEŻENIE: &r&cRęczne usuwanie addonów może nie być obsługiwane przez każdy addon!<br> &eAby kontynuować, wpisz ponownie to polecenie.'

        # Message shown on successful unload
        success: '&aAddon "{Addon}" został pomyślnie usunięty.'

        # Message shown if unloading fails
        fail: '&cNie udało się usunąć addona "{Addon}".'

    debug:

      # Message shown for incorrect command usage
      usage: '&bUżycie: /bodyhealth debug <dump/toggle> [...]'

      dump:

        # Message shown on dump start
        start: '&aZbieranie i eksportowanie informacji debugowania...'

        # Message shown on successful dump
        success: '&aInformacje debugowania zostały pomyślnie wyeksportowane do {File}.'

        # Message shown if dumping data fails
        fail: '&cNie udało się wyeksportować informacji debugowania!'

      toggle:

        # Message shown for toggling on debug mode
        normal-on: '&aTryb debugowania włączony.'

        # Message shown for toggling off debug mode
        normal-off: '&aTryb debugowania wyłączony.'

        # Message shown for toggling on verbose (development) mode
        verbose-on: '&aTryb deweloperski włączony.'

        # Message shown for toggling off verbose (development) mode
        verbose-off: '&aTryb deweloperski wyłączony.'