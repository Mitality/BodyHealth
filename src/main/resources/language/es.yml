definitions:

  body-parts:

    # Used in command responses ({Part})
    HEAD: 'cabeza'
    TORSO: 'cuerpo'
    ARM_LEFT: 'brazo izquierdo'
    ARM_RIGHT: 'brazo derecho'
    LEG_LEFT: 'pierna izquierda'
    LEG_RIGHT: 'pierna derecha'
    FOOT_LEFT: 'pie izquierdo'
    FOOT_RIGHT: 'pie derecho'

  body-part-states:

    # Used in PAPI placeholders
    FULL: 'sano'
    NEARLYFULL: 'leve'
    INTERMEDIATE: 'moderado'
    DAMAGED: 'grave'
    BROKEN: 'roto'

commands:

  bodyhealth:

    # Message shown for incorrect command usage
    usage: '&bUso: /bodyhealth <subcomando>'

    # Message shown for invalid subcommands
    invalid: '&cAcción inválida. Por favor, usa un subcomando válido.'

    # Message shown if a command is player-only but used from the console
    player-only: '&cEste subcomando solo puede ser ejecutado por jugadores.'

    # Message shown if the player lacks permission for a command
    not-permitted: '&cNo tienes permiso para usar este comando.'

    add:

      # Message shown for incorrect command usage
      usage: '&bUso: /bodyhealth add [jugador] [parte del cuerpo] <valor>'

      # Message shown when no valid target player could be retrieved
      no-target: '&cPor favor, proporciona un jugador al ejecutar este comando desde la consola.'

      # Message shown if the value provided is invalid
      invalid-value: '&cValor de salud inválido: "{Value}".'

      # Message shown on successful health update (all parts)
      success-all: '&aSe añadió con éxito {Value} a todas las partes del cuerpo de {Player}.'

      # Message shown on successful health update (given part)
      success-single: '&aSe añadió con éxito {Value} a la {Part} de {Player}.'

    get:

      # Message shown for incorrect command usage
      usage: '&bUso: /bodyhealth get [jugador] [parte del cuerpo]'

      # Message shown when no valid target player could be retrieved
      no-target: '&cPor favor, proporciona un jugador al ejecutar este comando desde la consola.'

      # Message shown on successful health retrieval (all parts)
      success-all: "&aSalud corporal de {Player}:\n&e&lCabeza &8&l» &a{Health_HEAD}%\n&e&lCuerpo &8&l» &a{Health_TORSO}%\n&e&lBrazo izquierdo &8&l» &a{Health_ARM_LEFT}%\n&e&lBrazo derecho &8&l» &a{Health_ARM_RIGHT}%\n&e&lPierna izquierda &8&l» &a{Health_LEG_LEFT}%\n&e&lPierna derecha &8&l» &a{Health_LEG_RIGHT}%\n&e&lPie izquierdo &8&l» &a{Health_FOOT_LEFT}%\n&e&lPie derecho &8&l» &a{Health_FOOT_RIGHT}%"

      # Message shown on successful health retrieval (given part)
      success-single: '&aLa {Part} de {Player} está al {Health}%.'

    heal:

      # Message shown for incorrect command usage
      usage: '&bUso: /bodyhealth set [jugador] [parte del cuerpo] <valor>'

      # Message shown when no valid target player could be retrieved
      no-target: '&cPor favor, proporciona un jugador al ejecutar este comando desde la consola.'

      # Message shown on successful healing
      success-all: '&a{Player} ha sido completamente curado.'

      # Message shown on successful healing
      success-single: '&aLa {Part} de {Player} ha sido completamente curada.'

    reload:

      # Message shown on successful configuration reload
      success: '&aLa configuración se ha recargado.'

      # Message shown if reload fails
      fail: '&cNo se pudo recargar la configuración.'

    set:

      # Message shown for incorrect command usage
      usage: '&bUso: /bodyhealth set [jugador] [parte del cuerpo] <valor>'

      # Message shown when no valid target player could be retrieved
      no-target: '&cPor favor, proporciona un jugador al ejecutar este comando desde la consola.'

      # Message shown if the value provided is invalid
      invalid-value: '&cValor de salud inválido: "{Value}".'

      # Message shown on successful health update (all parts)
      success-all: '&aSe estableció con éxito {Value} en todas las partes del cuerpo de {Player}.'

      # Message shown on successful health update (given part)
      success-single: '&aSe estableció con éxito {Value} en la {Part} de {Player}.'

    data:

      # Message shown for incorrect command usage
      usage: '&bUso: /bodyhealth data <save/dump/erase/move> [...]'

      save:

        # Message shown on successful save
        success: '&aDatos guardados correctamente para {Count} jugador(es) en línea.'

      dump:

        # Message shown for incorrect command usage (dump)
        usage: '&bUso: /bodyhealth data dump <tipo de almacenamiento>'

        # Message shown on dump start
        start: '&aRecopilando y volcando datos desde el almacenamiento {Type} de BodyHealth...'

        # Message shown on successful dump
        success: '&aDatos de {Count} jugador(es) volcados correctamente desde el almacenamiento {Type} de BodyHealth a {File}.'

        # Message shown if dumping data fails
        fail: '&cError al volcar los datos existentes del almacenamiento {Type} de BodyHealth.'

      erase:

        # Message shown for incorrect command usage (erase)
        usage: '&bUso: /bodyhealth data erase <tipo de almacenamiento>'

        # Message used to confirm the erase command
        confirmation: '&c&lADVERTENCIA: &r&c¡Estás a punto de borrar todos los datos existentes del almacenamiento {Type} de BodyHealth!<br> &ePara continuar, escribe este comando nuevamente.'

        # Message shown on erase start
        start: '&aBorrando todos los datos del almacenamiento {Type} de BodyHealth...'

        # Message shown on successful erase
        success: '&aTodos los datos del almacenamiento {Type} de BodyHealth se han borrado correctamente.'

        # Message shown if erasing data fails
        fail: '&cError al borrar todos los datos del almacenamiento {Type} de BodyHealth.'

      move:

        # Message shown for incorrect command usage (move)
        usage: '&bUso: /bodyhealth data move <tipo de almacenamiento> <tipo de almacenamiento>'

        # Message used to confirm the move command
        confirmation: '&c&lADVERTENCIA: &r&c¡Estás a punto de mover todos los datos del almacenamiento {Type1} al {Type2} de BodyHealth, lo que podría sobrescribir datos existentes!<br> &ePara continuar, escribe este comando nuevamente.'

        # Message shown on move start
        start: '&aMoviendo datos del almacenamiento {Type1} al {Type2} de BodyHealth...'

        # Message shown on successful move
        success: '&aDatos para {Count} jugador(es) movidos correctamente del almacenamiento {Type1} al {Type2} de BodyHealth.'

        # Message shown if moving data fails
        fail: '&cError al mover todos los datos existentes del almacenamiento {Type1} al {Type2} de BodyHealth.'


    addon:

      # Message shown for incorrect command usage
      usage: '&bUso: /bodyhealth addon <list/info/enable/disable/reload/load/unload>'

      # Message shown when the specified addon could not be found
      not-found: '&cAddon "{Addon}" no encontrado.'

      list:

        # Header shown before listing addons
        header: '&bAddons cargados ({Count}): '

        # Separator between addon name entries
        separator: '&7, '

        # Entry format for enabled addons
        entry-enabled: '&a{Name}'

        # Entry format for disabled addons
        entry-disabled: '&c{Name}'

        # Message shown when no addons are loaded
        none: '&7No hay addons cargados.'

      info:

        # Message shown for incorrect command usage
        usage: '&bUso: /bodyhealth addon info <addon>'

        # Message shown to display addon information
        display: "&bInformación del addon &f{Name}&b:\n&bDescripción: &f{Description}\n&bAutor: &f{Author}\n&bVersión: &f{Version}\n&bEstado: {Status}"

        # Label for an enabled addon status
        status-enabled: '&aActivado'

        # Label for a disabled addon status
        status-disabled: '&cDesactivado'

      enable:

        # Message shown for incorrect command usage
        usage: '&bUso: /bodyhealth addon enable <addon>'

        # Message shown if the addon is already enabled
        already-enabled: '&cEl addon "{Addon}" ya está activado.'

        # Message shown on successful enable
        success: '&aEl addon "{Addon}" ha sido activado.'

        # Message shown if enabling fails
        fail: '&cNo se pudo activar el addon "{Addon}".'

      disable:

        # Message shown for incorrect command usage
        usage: '&bUso: /bodyhealth addon disable <addon>'

        # Message shown if the addon is already disabled
        already-disabled: '&cEl addon "{Addon}" ya está desactivado.'

        # Message shown on successful disable
        success: '&aEl addon "{Addon}" ha sido desactivado.'

        # Message shown if disabling fails
        fail: '&cNo se pudo desactivar el addon "{Addon}".'

      reload:

        # Message shown for incorrect command usage
        usage: '&bUso: /bodyhealth addon reload <addon>'

        # Message shown on successful reload
        success: '&aEl addon "{Addon}" ha sido recargado.'

        # Message shown if reloading fails
        fail: '&cNo se pudo recargar el addon "{Addon}".'

      load:

        # Message shown for incorrect command usage
        usage: '&bUso: /bodyhealth addon load <archivo>'

        # Message shown when the specified addon file could not be found
        not-found: '&cArchivo de addon "{File}" no encontrado en el directorio de addons.'

        # Warning shown before loading an addon post onLoad (requires confirmation)
        warning: '&c&lADVERTENCIA: &r&cCargar addons manualmente puede no ser compatible con todos los addons!<br> &ePara continuar, escribe este comando nuevamente.'

        # Message shown if the addon is already loaded
        already-loaded: '&cEl addon de "{File}" ya está cargado.'

        # Message shown on successful load
        success: '&aAddon de "{File}" cargado correctamente.'

        # Message shown if loading fails
        fail: '&cNo se pudo cargar el addon de "{File}".'

      unload:

        # Message shown for incorrect command usage
        usage: '&bUso: /bodyhealth addon unload <addon>'

        # Warning shown before unloading an addon (requires confirmation)
        warning: '&c&lADVERTENCIA: &r&cDescargar addons manualmente puede no ser compatible con todos los addons!<br> &ePara continuar, escribe este comando nuevamente.'

        # Message shown on successful unload
        success: '&aAddon "{Addon}" descargado correctamente.'

        # Message shown if unloading fails
        fail: '&cNo se pudo descargar el addon "{Addon}".'

    debug:

      # Message shown for incorrect command usage
      usage: '&bUso: /bodyhealth debug <dump/toggle> [...]'

      dump:

        # Message shown on dump start
        start: '&aRecopilando y volcando información de depuración...'

        # Message shown on successful dump
        success: '&aInformación de depuración volcada correctamente en {File}.'

        # Message shown if dumping data fails
        fail: '&cError al volcar la información de depuración!'

      toggle:

        # Message shown for toggling on debug mode
        normal-on: '&aModo de depuración activado.'

        # Message shown for toggling off debug mode
        normal-off: '&aModo de depuración desactivado.'

        # Message shown for toggling on verbose (development) mode
        verbose-on: '&aModo de desarrollo activado.'

        # Message shown for toggling off verbose (development) mode
        verbose-off: '&aModo de desarrollo desactivado.'