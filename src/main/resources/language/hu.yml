definitions:

  body-parts:

    # Used in command responses ({Part})
    HEAD: 'fej'
    TORSO: 'test'
    ARM_LEFT: 'bal kar'
    ARM_RIGHT: 'jobb kar'
    LEG_LEFT: 'bal láb'
    LEG_RIGHT: 'jobb láb'
    FOOT_LEFT: 'bal lábfej'
    FOOT_RIGHT: 'jobb lábfej'

  body-part-states:

    # Used in PAPI placeholders
    FULL: 'egészséges'
    NEARLYFULL: 'enyhén sérült'
    INTERMEDIATE: 'közepesen sérült'
    DAMAGED: 'súlyosan sérült'
    BROKEN: 'eltört'

commands:

  bodyhealth:

    # Message shown for incorrect command usage
    usage: '&bHasználat: /bodyhealth <parancs>'

    # Message shown for invalid subcommands
    invalid: '&cÉrvénytelen parancs. Kérlek, használj egy érvényes parancsot.'

    # Message shown if a command is player-only but used from the console
    player-only: '&cEz a parancs csak játékosok által használható.'

    # Message shown if the player lacks permission for a command
    not-permitted: '&cNincs jogosultságod ehhez a parancshoz.'

    add:

      # Message shown for incorrect command usage
      usage: '&bHasználat: /bodyhealth add [játékos] [test rész] <érték>'

      # Message shown when no valid target player could be retrieved
      no-target: '&cKérlek, adj meg egy játékost, ha a parancsot a konzolról hajtod végre.'

      # Message shown if the value provided is invalid
      invalid-value: '&cÉrvénytelen egészség érték: "{Value}".'

      # Message shown on successful health update (all parts)
      success-all: '&a{Player} testének minden részére sikeresen hozzáadva: {Value}.'

      # Message shown on successful health update (given part)
      success-single: '&a{Player} {Part} részére sikeresen hozzáadva: {Value}.'

    get:

      # Message shown for incorrect command usage
      usage: '&bHasználat: /bodyhealth get [játékos] [test rész]'

      # Message shown when no valid target player could be retrieved
      no-target: '&cKérlek, adj meg egy játékost, ha a parancsot a konzolról hajtod végre.'

      # Message shown on successful health retrieval (all parts)
      success-all: "&a{Player} testének állapota:\n&e&lFej &8&l» &a{Health_HEAD}%\n&e&lTest &8&l» &a{Health_TORSO}%\n&e&lBal kar &8&l» &a{Health_ARM_LEFT}%\n&e&lJobb kar &8&l» &a{Health_ARM_RIGHT}%\n&e&lBal láb &8&l» &a{Health_LEG_LEFT}%\n&e&lJobb láb &8&l» &a{Health_LEG_RIGHT}%\n&e&lBal lábfej &8&l» &a{Health_FOOT_LEFT}%\n&e&lJobb lábfej &8&l» &a{Health_FOOT_RIGHT}%"

      # Message shown on successful health retrieval (given part)
      success-single: '&a{Player} {Part} része {Health}% állapotban van.'

    heal:

      # Message shown for incorrect command usage
      usage: '&bHasználat: /bodyhealth set [játékos] [test rész] <érték>'

      # Message shown when no valid target player could be retrieved
      no-target: '&cKérlek, adj meg egy játékost, ha a parancsot a konzolról hajtod végre.'

      # Message shown on successful healing
      success-all: '&a{Player} teljesen meggyógyult.'

      # Message shown on successful healing
      success-single: '&a{Player} {Part} része teljesen meggyógyult.'

    reload:

      # Message shown on successful configuration reload
      success: '&aA konfiguráció sikeresen újratöltve.'

      # Message shown if reload fails
      fail: '&cA konfiguráció újratöltése nem sikerült.'

    set:

      # Message shown for incorrect command usage
      usage: '&bHasználat: /bodyhealth set [játékos] [test rész] <érték>'

      # Message shown when no valid target player could be retrieved
      no-target: '&cKérlek, adj meg egy játékost, ha a parancsot a konzolról hajtod végre.'

      # Message shown if the value provided is invalid
      invalid-value: '&cÉrvénytelen egészség érték: "{Value}".'

      # Message shown on successful health update (all parts)
      success-all: '&aMinden test rész {Player} számára {Value}-ra lett beállítva.'

      # Message shown on successful health update (given part)
      success-single: '&a{Player} {Part} részét sikeresen {Value}-ra állítottuk.'

    data:

      # Message shown for incorrect command usage
      usage: '&bHasználat: /bodyhealth data <save/dump/erase/move> [...]'

      save:

        # Message shown on successful save
        success: '&aSikeresen elmentve minden adat {Count} online játékos számára.'

      dump:

        # Message shown for incorrect command usage (dump)
        usage: '&bHasználat: /bodyhealth data dump <tároló típus>'

        # Message shown on dump start
        start: '&aAdatok gyűjtése és exportálása a BodyHealth {Type} tárolójából...'

        # Message shown on successful dump
        success: '&aSikeresen exportálva {Count} játékos adatai a BodyHealth {Type} tárolójából a {File} fájlba.'

        # Message shown if dumping data fails
        fail: '&cNem sikerült exportálni az adatokat a BodyHealth {Type} tárolójából.'

      erase:

        # Message shown for incorrect command usage (erase)
        usage: '&bHasználat: /bodyhealth data erase <tároló típus>'

        # Message used to confirm the erase command
        confirmation: '&c&lFIGYELMEZTETÉS: &r&cMinden adat törlésre kerül a BodyHealth {Type} tárolójából!<br> &eA folytatáshoz írd be újra ezt a parancsot.'

        # Message shown on erase start
        start: '&aMinden adat törlése a BodyHealth {Type} tárolójából...'

        # Message shown on successful erase
        success: '&aSikeresen törölve minden adat a BodyHealth {Type} tárolójából.'

        # Message shown if erasing data fails
        fail: '&cNem sikerült törölni az adatokat a BodyHealth {Type} tárolójából.'

      move:

        # Message shown for incorrect command usage (move)
        usage: '&bHasználat: /bodyhealth data move <tároló típus> <tároló típus>'

        # Message used to confirm the move command
        confirmation: '&c&lFIGYELMEZTETÉS: &r&cAz összes adat áthelyezésre kerül a BodyHealth {Type1} tárolójából a {Type2} tárolóba, ami felülírhatja a meglévő adatokat!<br> &eA folytatáshoz írd be újra ezt a parancsot.'

        # Message shown on move start
        start: '&aAdatok áthelyezése a BodyHealth {Type1} tárolójából a {Type2} tárolóba...'

        # Message shown on successful move
        success: '&aSikeresen áthelyezve {Count} játékos adatai a BodyHealth {Type1} tárolójából a {Type2} tárolóba.'

        # Message shown if moving data fails
        fail: '&cNem sikerült áthelyezni az adatokat a BodyHealth {Type1} tárolójából a {Type2} tárolóba.'


    addon:

      # Message shown for incorrect command usage
      usage: '&bHasználat: /bodyhealth addon <list/info/enable/disable/reload/load/unload>'

      # Message shown when the specified addon could not be found
      not-found: '&cAz "{Addon}" addon nem található.'

      list:

        # Header shown before listing addons
        header: '&bBetöltött Addonok ({Count}): '

        # Separator between addon name entries
        separator: '&7, '

        # Entry format for enabled addons
        entry-enabled: '&a{Name}'

        # Entry format for disabled addons
        entry-disabled: '&c{Name}'

        # Message shown when no addons are loaded
        none: '&7Nincs betöltött addon.'

      info:

        # Message shown for incorrect command usage
        usage: '&bHasználat: /bodyhealth addon info <addon>'

        # Message shown to display addon information
        display: "&bAddon adatok - &f{Name}&b:\n&bLeírás: &f{Description}\n&bSzerző: &f{Author}\n&bVerzió: &f{Version}\n&bÁllapot: {Status}"

        # Label for an enabled addon status
        status-enabled: '&aEngedélyezett'

        # Label for a disabled addon status
        status-disabled: '&cLetiltott'

      enable:

        # Message shown for incorrect command usage
        usage: '&bHasználat: /bodyhealth addon enable <addon>'

        # Message shown if the addon is already enabled
        already-enabled: '&cAz "{Addon}" addon már engedélyezve van.'

        # Message shown on successful enable
        success: '&aAz "{Addon}" addon engedélyezve lett.'

        # Message shown if enabling fails
        fail: '&cNem sikerült engedélyezni az "{Addon}" addont.'

      disable:

        # Message shown for incorrect command usage
        usage: '&bHasználat: /bodyhealth addon disable <addon>'

        # Message shown if the addon is already disabled
        already-disabled: '&cAz "{Addon}" addon már le van tiltva.'

        # Message shown on successful disable
        success: '&aAz "{Addon}" addon le lett tiltva.'

        # Message shown if disabling fails
        fail: '&cNem sikerült letiltani az "{Addon}" addont.'

      reload:

        # Message shown for incorrect command usage
        usage: '&bHasználat: /bodyhealth addon reload <addon>'

        # Message shown on successful reload
        success: '&aAz "{Addon}" addon újratöltve.'

        # Message shown if reloading fails
        fail: '&cNem sikerült újratölteni az "{Addon}" addont.'

      load:

        # Message shown for incorrect command usage
        usage: '&bHasználat: /bodyhealth addon load <fájl>'

        # Message shown when the specified addon file could not be found
        not-found: '&cAz "{File}" addon-fájl nem található az addons könyvtárban.'

        # Warning shown before loading an addon post onLoad (requires confirmation)
        warning: '&c&lFIGYELMEZTETÉS: &r&cAddonok kézi betöltése esetleg nem támogatott minden addon által!<br> &eA folytatáshoz kérjük, írd be újra ezt a parancsot.'

        # Message shown if the addon is already loaded
        already-loaded: '&cAz "{File}" fájlból az addon már be van töltve.'

        # Message shown on successful load
        success: '&aAz "{File}" fájlból az addon sikeresen betöltve.'

        # Message shown if loading fails
        fail: '&cNem sikerült betölteni az addont az "{File}" fájlból.'

      unload:

        # Message shown for incorrect command usage
        usage: '&bHasználat: /bodyhealth addon unload <addon>'

        # Warning shown before unloading an addon (requires confirmation)
        warning: '&c&lFIGYELMEZTETÉS: &r&cAddonok kézi eltávolítása esetleg nem támogatott minden addon által!<br> &eA folytatáshoz kérjük, írd be újra ezt a parancsot.'

        # Message shown on successful unload
        success: '&aAz "{Addon}" addon sikeresen eltávolítva.'

        # Message shown if unloading fails
        fail: '&cNem sikerült eltávolítani az "{Addon}" addont.'

    debug:

      # Message shown for incorrect command usage
      usage: '&bHasználat: /bodyhealth debug <dump/toggle> [...]'

      dump:

        # Message shown on dump start
        start: '&aHibakeresési információk gyűjtése és exportálása...'

        # Message shown on successful dump
        success: '&aA hibakeresési információk sikeresen exportálva a {File} fájlba.'

        # Message shown if dumping data fails
        fail: '&cNem sikerült exportálni a hibakeresési információkat!'

      toggle:

        # Message shown for toggling on debug mode
        normal-on: '&aHibakeresési mód engedélyezve.'

        # Message shown for toggling off debug mode
        normal-off: '&aHibakeresési mód kikapcsolva.'

        # Message shown for toggling on verbose (development) mode
        verbose-on: '&aFejlesztői mód engedélyezve.'

        # Message shown for toggling off verbose (development) mode
        verbose-off: '&aFejlesztői mód kikapcsolva.'