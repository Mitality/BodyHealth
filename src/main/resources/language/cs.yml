definitions:

  body-parts:

    # Used in command responses ({Part})
    HEAD: 'hlava'
    TORSO: 'tělo'
    ARM_LEFT: 'levá ruka'
    ARM_RIGHT: 'pravá ruka'
    LEG_LEFT: 'levá noha'
    LEG_RIGHT: 'pravá noha'
    FOOT_LEFT: 'levá noha'
    FOOT_RIGHT: 'pravá noha'

  body-part-states:

    # Used in PAPI placeholders
    FULL: 'zdravý'
    NEARLYFULL: 'lehce zraněný'
    INTERMEDIATE: 'středně zraněný'
    DAMAGED: 'vážně zraněný'
    BROKEN: 'zlomený'

commands:

  bodyhealth:

    # Message shown for incorrect command usage
    usage: '&bPoužití: /bodyhealth <podpříkaz>'

    # Message shown for invalid subcommands
    invalid: '&cNeplatná akce. Použijte prosím platný podpříkaz.'

    # Message shown if a command is player-only but used from the console
    player-only: '&cTento podpříkaz může být proveden pouze hráči.'

    # Message shown if the player lacks permission for a command
    not-permitted: '&cNemáte oprávnění k použití tohoto příkazu.'

    add:

      # Message shown for incorrect command usage
      usage: '&bPoužití: /bodyhealth add [hráč] [část těla] <hodnota>'

      # Message shown when no valid target player could be retrieved
      no-target: '&cZadejte hráče, když spouštíte tento příkaz z konzole.'

      # Message shown if the value provided is invalid
      invalid-value: '&cNeplatná hodnota zdraví: "{Value}".'

      # Message shown on successful health update (all parts)
      success-all: '&aÚspěšně přidáno {Value} ke všem částem těla {Player}.'

      # Message shown on successful health update (given part)
      success-single: '&aÚspěšně přidáno {Value} k {Player}''s {Part}.'

    get:

      # Message shown for incorrect command usage
      usage: '&bPoužití: /bodyhealth get [hráč] [část těla]'

      # Message shown when no valid target player could be retrieved
      no-target: '&cZadejte hráče, když spouštíte tento příkaz z konzole.'

      # Message shown on successful health retrieval (all parts)
      success-all: "&aZdraví těla {Player}:\n&e&lHlava &8&l» &a{Health_HEAD}%\n&e&lTělo &8&l» &a{Health_TORSO}%\n&e&lLevá ruka &8&l» &a{Health_ARM_LEFT}%\n&e&lPravá ruka &8&l» &a{Health_ARM_RIGHT}%\n&e&lLevá noha &8&l» &a{Health_LEG_LEFT}%\n&e&lPravá noha &8&l» &a{Health_LEG_RIGHT}%\n&e&lLevá noha &8&l» &a{Health_FOOT_LEFT}%\n&e&lPravá noha &8&l» &a{Health_FOOT_RIGHT}%"

      # Message shown on successful health retrieval (given part)
      success-single: '&a{Player}''s {Part} je na {Health}%.'

    heal:

      # Message shown for incorrect command usage
      usage: '&bPoužití: /bodyhealth set [hráč] [část těla] <hodnota>'

      # Message shown when no valid target player could be retrieved
      no-target: '&cZadejte hráče, když spouštíte tento příkaz z konzole.'

      # Message shown on successful healing
      success-all: '&a{Player} byl úplně vyléčen.'

      # Message shown on successful healing
      success-single: '&a{Player}''s {Part} bylo úplně vyléčeno.'

    reload:

      # Message shown on successful configuration reload
      success: '&aKonfigurace byla znovu načtena.'

      # Message shown if reload fails
      fail: '&cKonfigurace se nepodařilo znovu načíst.'

    set:

      # Message shown for incorrect command usage
      usage: '&bPoužití: /bodyhealth set [hráč] [část těla] <hodnota>'

      # Message shown when no valid target player could be retrieved
      no-target: '&cZadejte hráče, když spouštíte tento příkaz z konzole.'

      # Message shown if the value provided is invalid
      invalid-value: '&cNeplatná hodnota zdraví: "{Value}".'

      # Message shown on successful health update (all parts)
      success-all: '&aÚspěšně nastavena hodnota {Value} pro všechny části těla {Player}.'

      # Message shown on successful health update (given part)
      success-single: '&aÚspěšně nastavena hodnota {Value} pro {Player}''s {Part}.'

    data:

      # Message shown for incorrect command usage
      usage: '&bPoužití: /bodyhealth data <save/dump/erase/move> [...]'

      save:

        # Message shown on successful save
        success: '&aVšechny údaje pro {Count} online hráče(-ů) byly úspěšně uloženy.'

      dump:

        # Message shown for incorrect command usage (dump)
        usage: '&bPoužití: /bodyhealth data dump <typ úložiště>'

        # Message shown on dump start
        start: '&aShromažďuji a vypisuji data ze {Type}-úložiště BodyHealth...'

        # Message shown on successful dump
        success: '&aÚspěšně vypsána data pro {Count} hráče/-ů z {Type}-úložiště BodyHealth do {File}.'

        # Message shown if dumping data fails
        fail: '&cNepodařilo se vypsat existující data z {Type}-úložiště BodyHealth.'

      erase:

        # Message shown for incorrect command usage (erase)
        usage: '&bPoužití: /bodyhealth data erase <typ úložiště>'

        # Message used to confirm the erase command
        confirmation: '&c&lUPOZORNĚNÍ: &r&cChystáte se vymazat všechna existující data z {Type}-úložiště BodyHealth!<br> &eChcete-li pokračovat, zadejte tento příkaz znovu.'

        # Message shown on erase start
        start: '&aVymazávám všechna data z {Type}-úložiště BodyHealth...'

        # Message shown on successful erase
        success: '&aVšechna data z {Type}-úložiště BodyHealth byla úspěšně vymazána.'

        # Message shown if erasing data fails
        fail: '&cNepodařilo se vymazat všechna data z {Type}-úložiště BodyHealth.'

      move:

        # Message shown for incorrect command usage (move)
        usage: '&bPoužití: /bodyhealth data move <typ úložiště> <typ úložiště>'

        # Message used to confirm the move command
        confirmation: '&c&lUPOZORNĚNÍ: &r&cChystáte se přesunout všechna data z {Type1}-úložiště do {Type2}-úložiště BodyHealth, což může přepsat již existující data!<br> &eChcete-li pokračovat, zadejte tento příkaz znovu.'

        # Message shown on move start
        start: '&aPřesouvám data z {Type1}-úložiště do {Type2}-úložiště BodyHealth...'

        # Message shown on successful move
        success: '&aData pro {Count} hráče/-ů byla úspěšně přesunuta z {Type1}-úložiště do {Type2}-úložiště BodyHealth.'

        # Message shown if moving data fails
        fail: '&cNepodařilo se přesunout všechna existující data z {Type1}-úložiště do {Type2}-úložiště BodyHealth.'


    addon:

      # Message shown for incorrect command usage
      usage: '&bPoužití: /bodyhealth addon <list/info/enable/disable/reload/load/unload>'

      # Message shown when the specified addon could not be found
      not-found: '&cAddon "{Addon}" nebyl nalezen.'

      list:

        # Header shown before listing addons
        header: '&bNačtené addony ({Count}): '

        # Separator between addon name entries
        separator: '&7, '

        # Entry format for enabled addons
        entry-enabled: '&a{Name}'

        # Entry format for disabled addons
        entry-disabled: '&c{Name}'

        # Message shown when no addons are loaded
        none: '&7Žádné addony nejsou načteny.'

      info:

        # Message shown for incorrect command usage
        usage: '&bPoužití: /bodyhealth addon info <addon>'

        # Message shown to display addon information
        display: "&bInformace o addonu &f{Name}&b:\n&bPopis: &f{Description}\n&bAutor: &f{Author}\n&bVerze: &f{Version}\n&bStav: {Status}"

        # Label for an enabled addon status
        status-enabled: '&aPovoleno'

        # Label for a disabled addon status
        status-disabled: '&cZakázáno'

      enable:

        # Message shown for incorrect command usage
        usage: '&bPoužití: /bodyhealth addon enable <addon>'

        # Message shown if the addon is already enabled
        already-enabled: '&cAddon "{Addon}" je již povolen.'

        # Message shown on successful enable
        success: '&aAddon "{Addon}" byl povolen.'

        # Message shown if enabling fails
        fail: '&cNepodařilo se povolit addon "{Addon}".'

      disable:

        # Message shown for incorrect command usage
        usage: '&bPoužití: /bodyhealth addon disable <addon>'

        # Message shown if the addon is already disabled
        already-disabled: '&cAddon "{Addon}" je již zakázán.'

        # Message shown on successful disable
        success: '&aAddon "{Addon}" byl zakázán.'

        # Message shown if disabling fails
        fail: '&cNepodařilo se zakázat addon "{Addon}".'

      reload:

        # Message shown for incorrect command usage
        usage: '&bPoužití: /bodyhealth addon reload <addon>'

        # Message shown on successful reload
        success: '&aAddon "{Addon}" byl znovu načten.'

        # Message shown if reloading fails
        fail: '&cNepodařilo se znovu načíst addon "{Addon}".'

      load:

        # Message shown for incorrect command usage
        usage: '&bPoužití: /bodyhealth addon load <soubor>'

        # Message shown when the specified addon file could not be found
        not-found: '&cSoubor addonu "{File}" nebyl nalezen v adresáři addonů.'

        # Warning shown before loading an addon post onLoad (requires confirmation)
        warning: '&c&lUPOZORNĚNÍ: &r&cRuční načítání addonů nemusí být každým addonem podporováno!<br> &eChcete-li pokračovat, zadejte tento příkaz znovu.'

        # Message shown if the addon is already loaded
        already-loaded: '&cAddon ze souboru "{File}" je již načten.'

        # Message shown on successful load
        success: '&aAddon ze souboru "{File}" byl úspěšně načten.'

        # Message shown if loading fails
        fail: '&cNepodařilo se načíst addon ze souboru "{File}".'

      unload:

        # Message shown for incorrect command usage
        usage: '&bPoužití: /bodyhealth addon unload <addon>'

        # Warning shown before unloading an addon (requires confirmation)
        warning: '&c&lUPOZORNĚNÍ: &r&cRuční odebírání addonů nemusí být každým addonem podporováno!<br> &eChcete-li pokračovat, zadejte tento příkaz znovu.'

        # Message shown on successful unload
        success: '&aAddon "{Addon}" byl úspěšně odebrán.'

        # Message shown if unloading fails
        fail: '&cNepodařilo se odebrat addon "{Addon}".'

    debug:

      # Message shown for incorrect command usage
      usage: '&bPoužití: /bodyhealth debug <dump/toggle> [...]'

      dump:

        # Message shown on dump start
        start: '&aShromažďuji a vypisuji debug informace...'

        # Message shown on successful dump
        success: '&aDebug informace úspěšně vypsány do {File}.'

        # Message shown if dumping data fails
        fail: '&cNepodařilo se vypsat debug informace!'

      toggle:

        # Message shown for toggling on debug mode
        normal-on: '&aDebug mód zapnut.'

        # Message shown for toggling off debug mode
        normal-off: '&aDebug mód vypnut.'

        # Message shown for toggling on verbose (development) mode
        verbose-on: '&aVývojový mód zapnut.'

        # Message shown for toggling off verbose (development) mode
        verbose-off: '&aVývojový mód vypnut.'