definitions:

  body-parts:

    # Used in command responses ({Part})
    HEAD: 'κεφάλι'
    TORSO: 'σώμα'
    ARM_LEFT: 'αριστερό χέρι'
    ARM_RIGHT: 'δεξί χέρι'
    LEG_LEFT: 'αριστερό πόδι'
    LEG_RIGHT: 'δεξί πόδι'
    FOOT_LEFT: 'αριστερό πόδι'
    FOOT_RIGHT: 'δεξί πόδι'

  body-part-states:

    # Used in PAPI placeholders
    FULL: 'υγιές'
    NEARLYFULL: 'ελαφρύ τραύμα'
    INTERMEDIATE: 'μέτριο τραύμα'
    DAMAGED: 'σοβαρό τραύμα'
    BROKEN: 'σπασμένο'

commands:

  bodyhealth:

    # Message shown for incorrect command usage
    usage: '&bΧρήση: /bodyhealth <υποεντολή>'

    # Message shown for invalid subcommands
    invalid: '&cΜη έγκυρη ενέργεια. Παρακαλώ χρησιμοποιήστε μια έγκυρη υποεντολή.'

    # Message shown if a command is player-only but used from the console
    player-only: '&cΑυτή η υποεντολή μπορεί να εκτελεστεί μόνο από παίκτες.'

    # Message shown if the player lacks permission for a command
    not-permitted: '&cΔεν έχετε άδεια να χρησιμοποιήσετε αυτήν την εντολή.'

    add:

      # Message shown for incorrect command usage
      usage: '&bΧρήση: /bodyhealth add [παίκτης] [μέλος σώματος] <τιμή>'

      # Message shown when no valid target player could be retrieved
      no-target: '&cΠαρακαλώ καθορίστε έναν παίκτη όταν εκτελείτε αυτήν την εντολή από την κονσόλα.'

      # Message shown if the value provided is invalid
      invalid-value: '&cΜη έγκυρη τιμή υγείας: "{Value}".'

      # Message shown on successful health update (all parts)
      success-all: '&aΕπιτυχώς προστέθηκε {Value} σε όλα τα μέλη του σώματος του {Player}.'

      # Message shown on successful health update (given part)
      success-single: '&aΕπιτυχώς προστέθηκε {Value} στο {Part} του {Player}.'

    get:

      # Message shown for incorrect command usage
      usage: '&bΧρήση: /bodyhealth get [παίκτης] [μέλος σώματος]'

      # Message shown when no valid target player could be retrieved
      no-target: '&cΠαρακαλώ καθορίστε έναν παίκτη όταν εκτελείτε αυτήν την εντολή από την κονσόλα.'

      # Message shown on successful health retrieval (all parts)
      success-all: "&aΥγεία του σώματος του {Player}:\n&e&lΚεφάλι &8&l» &a{Health_HEAD}%\n&e&lΣώμα &8&l» &a{Health_TORSO}%\n&e&lΑριστερό χέρι &8&l» &a{Health_ARM_LEFT}%\n&e&lΔεξί χέρι &8&l» &a{Health_ARM_RIGHT}%\n&e&lΑριστερό πόδι &8&l» &a{Health_LEG_LEFT}%\n&e&lΔεξί πόδι &8&l» &a{Health_LEG_RIGHT}%\n&e&lΑριστερό πόδι &8&l» &a{Health_FOOT_LEFT}%\n&e&lΔεξί πόδι &8&l» &a{Health_FOOT_RIGHT}%"

      # Message shown on successful health retrieval (given part)
      success-single: '&aΗ υγεία του {Player} στο {Part} είναι {Health}%.'

    heal:

      # Message shown for incorrect command usage
      usage: '&bΧρήση: /bodyhealth set [παίκτης] [μέλος σώματος] <τιμή>'

      # Message shown when no valid target player could be retrieved
      no-target: '&cΠαρακαλώ καθορίστε έναν παίκτη όταν εκτελείτε αυτήν την εντολή από την κονσόλα.'

      # Message shown on successful healing
      success-all: '&aΟ {Player} έχει θεραπευτεί πλήρως.'

      # Message shown on successful healing
      success-single: '&aΤο {Part} του {Player} έχει θεραπευτεί πλήρως.'

    reload:

      # Message shown on successful configuration reload
      success: '&aΗ διαμόρφωση φορτώθηκε ξανά.'

      # Message shown if reload fails
      fail: '&cΑποτυχία φόρτωσης της διαμόρφωσης.'

    set:

      # Message shown for incorrect command usage
      usage: '&bΧρήση: /bodyhealth set [παίκτης] [μέλος σώματος] <τιμή>'

      # Message shown when no valid target player could be retrieved
      no-target: '&cΠαρακαλώ καθορίστε έναν παίκτη όταν εκτελείτε αυτήν την εντολή από την κονσόλα.'

      # Message shown if the value provided is invalid
      invalid-value: '&cΜη έγκυρη τιμή υγείας: "{Value}".'

      # Message shown on successful health update (all parts)
      success-all: '&aΕπιτυχώς ρυθμίστηκε η τιμή {Value} για όλα τα μέλη του σώματος του {Player}.'

      # Message shown on successful health update (given part)
      success-single: '&aΕπιτυχώς ρυθμίστηκε η τιμή {Value} στο {Part} του {Player}.'

    data:

      # Message shown for incorrect command usage
      usage: '&bΧρήση: /bodyhealth data <save/dump/erase/move> [...]'

      save:

        # Message shown on successful save
        success: '&aΤα δεδομένα για {Count} συνδεδεμένους παίκτες αποθηκεύτηκαν με επιτυχία.'

      dump:

        # Message shown for incorrect command usage (dump)
        usage: '&bΧρήση: /bodyhealth data dump <τύπος αποθήκευσης>'

        # Message shown on dump start
        start: '&aΣυλλογή και εξαγωγή δεδομένων από την αποθήκευση {Type} του BodyHealth...'

        # Message shown on successful dump
        success: '&aΤα δεδομένα για {Count} παίκτες εξήχθησαν επιτυχώς από την αποθήκευση {Type} του BodyHealth στο {File}.'

        # Message shown if dumping data fails
        fail: '&cΑποτυχία εξαγωγής υπαρχόντων δεδομένων από την αποθήκευση {Type} του BodyHealth.'

      erase:

        # Message shown for incorrect command usage (erase)
        usage: '&bΧρήση: /bodyhealth data erase <τύπος αποθήκευσης>'

        # Message used to confirm the erase command
        confirmation: '&c&lΠΡΟΕΙΔΟΠΟΙΗΣΗ: &r&cΠρόκειται να διαγράψετε όλα τα υπάρχοντα δεδομένα από την αποθήκευση {Type} του BodyHealth!<br> &eΓια να συνεχίσετε, πληκτρολογήστε ξανά αυτήν την εντολή.'

        # Message shown on erase start
        start: '&aΔιαγραφή όλων των δεδομένων από την αποθήκευση {Type} του BodyHealth...'

        # Message shown on successful erase
        success: '&aΌλα τα δεδομένα από την αποθήκευση {Type} του BodyHealth διαγράφηκαν επιτυχώς.'

        # Message shown if erasing data fails
        fail: '&cΑποτυχία διαγραφής όλων των δεδομένων από την αποθήκευση {Type} του BodyHealth.'

      move:

        # Message shown for incorrect command usage (move)
        usage: '&bΧρήση: /bodyhealth data move <τύπος αποθήκευσης> <τύπος αποθήκευσης>'

        # Message used to confirm the move command
        confirmation: '&c&lΠΡΟΕΙΔΟΠΟΙΗΣΗ: &r&cΠρόκειται να μετακινήσετε όλα τα δεδομένα από την αποθήκευση {Type1} στην {Type2} του BodyHealth, ενδεχομένως αντικαθιστώντας υπάρχοντα δεδομένα!<br> &eΓια να συνεχίσετε, πληκτρολογήστε ξανά αυτήν την εντολή.'

        # Message shown on move start
        start: '&aΜετακίνηση δεδομένων από την αποθήκευση {Type1} στην {Type2} του BodyHealth...'

        # Message shown on successful move
        success: '&aΤα δεδομένα για {Count} παίκτες μετακινήθηκαν επιτυχώς από την αποθήκευση {Type1} στην {Type2} του BodyHealth.'

        # Message shown if moving data fails
        fail: '&cΑποτυχία μετακίνησης των υπαρχόντων δεδομένων από την αποθήκευση {Type1} στην {Type2} του BodyHealth.'


    addon:

      # Message shown for incorrect command usage
      usage: '&bΧρήση: /bodyhealth addon <list/info/enable/disable/reload/load/unload>'

      # Message shown when the specified addon could not be found
      not-found: '&cΤο addon "{Addon}" δεν βρέθηκε.'

      list:

        # Header shown before listing addons
        header: '&bΦορτωμένα Addons ({Count}): '

        # Separator between addon name entries
        separator: '&7, '

        # Entry format for enabled addons
        entry-enabled: '&a{Name}'

        # Entry format for disabled addons
        entry-disabled: '&c{Name}'

        # Message shown when no addons are loaded
        none: '&7Δεν υπάρχουν φορτωμένα addons.'

      info:

        # Message shown for incorrect command usage
        usage: '&bΧρήση: /bodyhealth addon info <addon>'

        # Message shown to display addon information
        display: "&bΠληροφορίες addon για &f{Name}&b:\n&bΠεριγραφή: &f{Description}\n&bΣυγγραφέας: &f{Author}\n&bΈκδοση: &f{Version}\n&bΚατάσταση: {Status}"

        # Label for an enabled addon status
        status-enabled: '&aΕνεργοποιημένο'

        # Label for a disabled addon status
        status-disabled: '&cΑπενεργοποιημένο'

      enable:

        # Message shown for incorrect command usage
        usage: '&bΧρήση: /bodyhealth addon enable <addon>'

        # Message shown if the addon is already enabled
        already-enabled: '&cΤο addon "{Addon}" είναι ήδη ενεργοποιημένο.'

        # Message shown on successful enable
        success: '&aΤο addon "{Addon}" ενεργοποιήθηκε.'

        # Message shown if enabling fails
        fail: '&cΑποτυχία ενεργοποίησης του addon "{Addon}".'

      disable:

        # Message shown for incorrect command usage
        usage: '&bΧρήση: /bodyhealth addon disable <addon>'

        # Message shown if the addon is already disabled
        already-disabled: '&cΤο addon "{Addon}" είναι ήδη απενεργοποιημένο.'

        # Message shown on successful disable
        success: '&aΤο addon "{Addon}" απενεργοποιήθηκε.'

        # Message shown if disabling fails
        fail: '&cΑποτυχία απενεργοποίησης του addon "{Addon}".'

      reload:

        # Message shown for incorrect command usage
        usage: '&bΧρήση: /bodyhealth addon reload <addon>'

        # Message shown on successful reload
        success: '&aΤο addon "{Addon}" επαναφορτώθηκε.'

        # Message shown if reloading fails
        fail: '&cΑποτυχία επαναφόρτωσης του addon "{Addon}".'

      load:

        # Message shown for incorrect command usage
        usage: '&bΧρήση: /bodyhealth addon load <αρχείο>'

        # Message shown when the specified addon file could not be found
        not-found: '&cΤο αρχείο addon "{File}" δεν βρέθηκε στον κατάλογο addons.'

        # Warning shown before loading an addon post onLoad (requires confirmation)
        warning: '&c&lΠΡΟΕΙΔΟΠΟΙΗΣΗ: &r&cΗ χειροκίνητη φόρτωση addons ενδέχεται να μην υποστηρίζεται από κάθε addon!<br> &eΓια να συνεχίσετε, πληκτρολογήστε ξανά αυτήν την εντολή.'

        # Message shown if the addon is already loaded
        already-loaded: '&cΤο addon από "{File}" είναι ήδη φορτωμένο.'

        # Message shown on successful load
        success: '&aΤο addon από "{File}" φορτώθηκε επιτυχώς.'

        # Message shown if loading fails
        fail: '&cΑποτυχία φόρτωσης addon από "{File}".'

      unload:

        # Message shown for incorrect command usage
        usage: '&bΧρήση: /bodyhealth addon unload <addon>'

        # Warning shown before unloading an addon (requires confirmation)
        warning: '&c&lΠΡΟΕΙΔΟΠΟΙΗΣΗ: &r&cΗ χειροκίνητη αφαίρεση addons ενδέχεται να μην υποστηρίζεται από κάθε addon!<br> &eΓια να συνεχίσετε, πληκτρολογήστε ξανά αυτήν την εντολή.'

        # Message shown on successful unload
        success: '&aΤο addon "{Addon}" αφαιρέθηκε επιτυχώς.'

        # Message shown if unloading fails
        fail: '&cΑποτυχία αφαίρεσης του addon "{Addon}".'

    debug:

      # Message shown for incorrect command usage
      usage: '&bΧρήση: /bodyhealth debug <dump/toggle> [...]'

      dump:

        # Message shown on dump start
        start: '&aΣυλλογή και εξαγωγή πληροφοριών αποσφαλμάτωσης...'

        # Message shown on successful dump
        success: '&aΟι πληροφορίες αποσφαλμάτωσης εξήχθησαν επιτυχώς στο {File}.'

        # Message shown if dumping data fails
        fail: '&cΑποτυχία εξαγωγής πληροφοριών αποσφαλμάτωσης!'

      toggle:

        # Message shown for toggling on debug mode
        normal-on: '&aΗ λειτουργία αποσφαλμάτωσης ενεργοποιήθηκε.'

        # Message shown for toggling off debug mode
        normal-off: '&aΗ λειτουργία αποσφαλμάτωσης απενεργοποιήθηκε.'

        # Message shown for toggling on verbose (development) mode
        verbose-on: '&aΗ λειτουργία ανάπτυξης ενεργοποιήθηκε.'

        # Message shown for toggling off verbose (development) mode
        verbose-off: '&aΗ λειτουργία ανάπτυξης απενεργοποιήθηκε.'