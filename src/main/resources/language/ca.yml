definitions:

  body-parts:

    # Used in command responses ({Part})
    HEAD: 'cap'
    TORSO: 'cos'
    ARM_LEFT: 'braç esquerre'
    ARM_RIGHT: 'braç dret'
    LEG_LEFT: 'cama esquerra'
    LEG_RIGHT: 'cama dreta'
    FOOT_LEFT: 'peu esquerre'
    FOOT_RIGHT: 'peu dret'

  body-part-states:

    # Used in PAPI placeholders
    FULL: 'sa'
    NEARLYFULL: 'lleu'
    INTERMEDIATE: 'moderat'
    DAMAGED: 'greu'
    BROKEN: 'trencat'

commands:

  bodyhealth:

    # Message shown for incorrect command usage
    usage: '&bÚs: /bodyhealth <subcomandament>'

    # Message shown for invalid subcommands
    invalid: '&cAcció no vàlida. Si us plau, utilitza un subcomandament vàlid.'

    # Message shown if a command is player-only but used from the console
    player-only: '&cAquest subcomandament només pot ser executat per jugadors.'

    # Message shown if the player lacks permission for a command
    not-permitted: '&cNo tens permís per utilitzar aquest comandament.'

    add:

      # Message shown for incorrect command usage
      usage: '&bÚs: /bodyhealth add [jugador] [part del cos] <valor>'

      # Message shown when no valid target player could be retrieved
      no-target: '&cSi us plau, proporciona un jugador quan executis aquest comandament des de la consola.'

      # Message shown if the value provided is invalid
      invalid-value: '&cValor de salut no vàlid: "{Value}".'

      # Message shown on successful health update (all parts)
      success-all: '&aS''ha afegit {Value} a totes les parts del cos de {Player}.'

      # Message shown on successful health update (given part)
      success-single: '&aS''ha afegit {Value} a {Player}''s {Part}.'

    get:

      # Message shown for incorrect command usage
      usage: '&bÚs: /bodyhealth get [jugador] [part del cos]'

      # Message shown when no valid target player could be retrieved
      no-target: '&cSi us plau, proporciona un jugador quan executis aquest comandament des de la consola.'

      # Message shown on successful health retrieval (all parts)
      success-all: "&aSalut del cos de {Player}:\n&e&lCap &8&l» &a{Health_HEAD}%\n&e&lCos &8&l» &a{Health_TORSO}%\n&e&Brax esquerre &8&l» &a{Health_ARM_LEFT}%\n&e&Braç dret &8&l» &a{Health_ARM_RIGHT}%\n&e&Cama esquerra &8&l» &a{Health_LEG_LEFT}%\n&e&Cama dreta &8&l» &a{Health_LEG_RIGHT}%\n&e&Peu esquerre &8&l» &a{Health_FOOT_LEFT}%\n&e&Peu dret &8&l» &a{Health_FOOT_RIGHT}%"

      # Message shown on successful health retrieval (given part)
      success-single: '&aLa salut de {Player}''s {Part} és {Health}%.'

    heal:

      # Message shown for incorrect command usage
      usage: '&bÚs: /bodyhealth set [jugador] [part del cos] <valor>'

      # Message shown when no valid target player could be retrieved
      no-target: '&cSi us plau, proporciona un jugador quan executis aquest comandament des de la consola.'

      # Message shown on successful healing
      success-all: '&a{Player} ha estat completament curat.'

      # Message shown on successful healing
      success-single: '&aLa {Part} de {Player} s''ha curat completament.'

    reload:

      # Message shown on successful configuration reload
      success: '&aLa configuració s''ha carregat novament.'

      # Message shown if reload fails
      fail: '&cNo s''ha pogut carregar la configuració.'

    set:

      # Message shown for incorrect command usage
      usage: '&bÚs: /bodyhealth set [jugador] [part del cos] <valor>'

      # Message shown when no valid target player could be retrieved
      no-target: '&cSi us plau, proporciona un jugador quan executis aquest comandament des de la consola.'

      # Message shown if the value provided is invalid
      invalid-value: '&cValor de salut no vàlid: "{Value}".'

      # Message shown on successful health update (all parts)
      success-all: '&aS''ha establert a {Value} totes les parts del cos de {Player}.'

      # Message shown on successful health update (given part)
      success-single: '&aS''ha establert {Value} a {Player}''s {Part}.'

    data:

      # Message shown for incorrect command usage
      usage: '&bÚs: /bodyhealth data <save/dump/erase/move> [...]'

      save:

        # Message shown on successful save
        success: '&aS''han desat correctament totes les dades per a {Count} jugador(s) en línia.'

      dump:

        # Message shown for incorrect command usage (dump)
        usage: '&bÚs: /bodyhealth data dump <tipus d’emmagatzematge>'

        # Message shown on dump start
        start: '&aRecollint i descarregant dades de l’emmagatzematge {Type} de BodyHealth...'

        # Message shown on successful dump
        success: '&aS''han descarregat correctament dades de {Count} jugador(s) de l’emmagatzematge {Type} de BodyHealth a {File}.'

        # Message shown if dumping data fails
        fail: '&cNo s''ha pogut descarregar les dades existents de l’emmagatzematge {Type} de BodyHealth.'

      erase:

        # Message shown for incorrect command usage (erase)
        usage: '&bÚs: /bodyhealth data erase <tipus d’emmagatzematge>'

        # Message used to confirm the erase command
        confirmation: '&c&lAVÍS: &r&cEstàs a punt d’esborrar totes les dades existents de l’emmagatzematge {Type} de BodyHealth!<br> &ePer continuar, si us plau escriu aquesta comanda novament.'

        # Message shown on erase start
        start: '&aEsborrant totes les dades de l’emmagatzematge {Type} de BodyHealth...'

        # Message shown on successful erase
        success: '&aS’han esborrat correctament totes les dades de l’emmagatzematge {Type} de BodyHealth.'

        # Message shown if erasing data fails
        fail: '&cNo s’ha pogut esborrar totes les dades de l’emmagatzematge {Type} de BodyHealth.'

      move:

        # Message shown for incorrect command usage (move)
        usage: '&bÚs: /bodyhealth data move <tipus d’emmagatzematge> <tipus d’emmagatzematge>'

        # Message used to confirm the move command
        confirmation: '&c&lAVÍS: &r&cEstàs a punt de moure totes les dades de l’emmagatzematge {Type1} al {Type2} de BodyHealth, cosa que podria sobreescriure dades ja existents!<br> &ePer continuar, si us plau escriu aquesta comanda novament.'

        # Message shown on move start
        start: '&aMovent dades de l’emmagatzematge {Type1} al {Type2} de BodyHealth...'

        # Message shown on successful move
        success: '&aS’han mogut amb èxit les dades de {Count} jugador(s) de l’emmagatzematge {Type1} al {Type2} de BodyHealth.'

        # Message shown if moving data fails
        fail: '&cNo s’han pogut moure totes les dades existents de l’emmagatzematge {Type1} al {Type2} de BodyHealth.'


    addon:

      # Message shown for incorrect command usage
      usage: '&bÚs: /bodyhealth addon <list/info/enable/disable/reload/load/unload>'

      # Message shown when the specified addon could not be found
      not-found: '&cL''addon "{Addon}" no s''ha trobat.'

      list:

        # Header shown before listing addons
        header: '&bAddons carregats ({Count}): '

        # Separator between addon name entries
        separator: '&7, '

        # Entry format for enabled addons
        entry-enabled: '&a{Name}'

        # Entry format for disabled addons
        entry-disabled: '&c{Name}'

        # Message shown when no addons are loaded
        none: '&7No hi ha addons carregats.'

      info:

        # Message shown for incorrect command usage
        usage: '&bÚs: /bodyhealth addon info <addon>'

        # Message shown to display addon information
        display: "&bInformació de l'addon &f{Name}&b:\n&bDescripció: &f{Description}\n&bAutor: &f{Author}\n&bVersió: &f{Version}\n&bEstat: {Status}"

        # Label for an enabled addon status
        status-enabled: '&aActivat'

        # Label for a disabled addon status
        status-disabled: '&cDesactivat'

      enable:

        # Message shown for incorrect command usage
        usage: '&bÚs: /bodyhealth addon enable <addon>'

        # Message shown if the addon is already enabled
        already-enabled: '&cL''addon "{Addon}" ja està activat.'

        # Message shown on successful enable
        success: '&aL''addon "{Addon}" s''ha activat.'

        # Message shown if enabling fails
        fail: '&cNo s''ha pogut activar l''addon "{Addon}".'

      disable:

        # Message shown for incorrect command usage
        usage: '&bÚs: /bodyhealth addon disable <addon>'

        # Message shown if the addon is already disabled
        already-disabled: '&cL''addon "{Addon}" ja està desactivat.'

        # Message shown on successful disable
        success: '&aL''addon "{Addon}" s''ha desactivat.'

        # Message shown if disabling fails
        fail: '&cNo s''ha pogut desactivar l''addon "{Addon}".'

      reload:

        # Message shown for incorrect command usage
        usage: '&bÚs: /bodyhealth addon reload <addon>'

        # Message shown on successful reload
        success: '&aL''addon "{Addon}" s''ha recarregat.'

        # Message shown if reloading fails
        fail: '&cNo s''ha pogut recarregar l''addon "{Addon}".'

      load:

        # Message shown for incorrect command usage
        usage: '&bÚs: /bodyhealth addon load <fitxer>'

        # Message shown when the specified addon file could not be found
        not-found: '&cEl fitxer d''addon "{File}" no s''ha trobat al directori d''addons.'

        # Warning shown before loading an addon post onLoad (requires confirmation)
        warning: '&c&lAVÍS: &r&cCarregar addons manualment pot no ser compatible amb tots els addons!<br> &ePer continuar, escriu aquesta comanda de nou.'

        # Message shown if the addon is already loaded
        already-loaded: '&cL''addon de "{File}" ja està carregat.'

        # Message shown on successful load
        success: '&aL''addon de "{File}" s''ha carregat correctament.'

        # Message shown if loading fails
        fail: '&cNo s''ha pogut carregar l''addon de "{File}".'

      unload:

        # Message shown for incorrect command usage
        usage: '&bÚs: /bodyhealth addon unload <addon>'

        # Warning shown before unloading an addon (requires confirmation)
        warning: '&c&lAVÍS: &r&cDescarregar addons manualment pot no ser compatible amb tots els addons!<br> &ePer continuar, escriu aquesta comanda de nou.'

        # Message shown on successful unload
        success: '&aL''addon "{Addon}" s''ha descarregat correctament.'

        # Message shown if unloading fails
        fail: '&cNo s''ha pogut descarregar l''addon "{Addon}".'

    debug:

      # Message shown for incorrect command usage
      usage: '&bÚs: /bodyhealth debug <dump/toggle> [...]'

      dump:

        # Message shown on dump start
        start: '&aRecollint i descarregant informació de depuració...'

        # Message shown on successful dump
        success: '&aS''ha descarregat correctament la informació de depuració a {File}.'

        # Message shown if dumping data fails
        fail: '&cNo s''ha pogut descarregar la informació de depuració!'

      toggle:

        # Message shown for toggling on debug mode
        normal-on: '&aMode debug activat.'

        # Message shown for toggling off debug mode
        normal-off: '&aMode debug desactivat.'

        # Message shown for toggling on verbose (development) mode
        verbose-on: '&aMode desenvolupament activat.'

        # Message shown for toggling off verbose (development) mode
        verbose-off: '&aMode desenvolupament desactivat.'