definitions:

  body-parts:

    # Used in command responses ({Part})
    HEAD: 'Kopf'
    TORSO: 'Körper'
    ARM_LEFT: 'linker Arm'
    ARM_RIGHT: 'rechter Arm'
    LEG_LEFT: 'linkes Bein'
    LEG_RIGHT: 'rechtes Bein'
    FOOT_LEFT: 'linker Fuß'
    FOOT_RIGHT: 'rechter Fuß'

  body-part-states:

    # Used in PAPI placeholders
    FULL: 'gesund'
    NEARLYFULL: 'leicht verletzt'
    INTERMEDIATE: 'mäßig verletzt'
    DAMAGED: 'schwer verletzt'
    BROKEN: 'gebrochen'

commands:

  bodyhealth:

    # Message shown for incorrect command usage
    usage: '&bVerwendung: /bodyhealth <Unterbefehl>'

    # Message shown for invalid subcommands
    invalid: '&cUngültige Aktion. Bitte benutze einen gültigen Unterbefehl.'

    # Message shown if a command is player-only but used from the console
    player-only: '&cDieser Unterbefehl kann nur von Spielern ausgeführt werden.'

    # Message shown if the player lacks permission for a command
    not-permitted: '&cDu hast keine Berechtigung, diesen Befehl zu verwenden.'

    add:

      # Message shown for incorrect command usage
      usage: '&bVerwendung: /bodyhealth add [Spieler] [Körperteil] <Wert>'

      # Message shown when no valid target player could be retrieved
      no-target: '&cBitte gib einen Spieler an, wenn du diesen Befehl aus der Konsole ausführst.'

      # Message shown if the value provided is invalid
      invalid-value: '&cUngültiger Gesundheitswert: "{Value}".'

      # Message shown on successful health update (all parts)
      success-all: '&aErfolgreich {Value} zu allen Körperteilen von {Player} hinzugefügt.'

      # Message shown on successful health update (given part)
      success-single: '&aErfolgreich {Value} zu {Player}''s {Part} hinzugefügt.'

    get:

      # Message shown for incorrect command usage
      usage: '&bVerwendung: /bodyhealth get [Spieler] [Körperteil]'

      # Message shown when no valid target player could be retrieved
      no-target: '&cBitte gib einen Spieler an, wenn du diesen Befehl aus der Konsole ausführst.'

      # Message shown on successful health retrieval (all parts)
      success-all: "&a{Player}'s Körpergesundheit:\n&e&lKopf &8&l» &a{Health_HEAD}%\n&e&lKörper &8&l» &a{Health_TORSO}%\n&e&lLinker Arm &8&l» &a{Health_ARM_LEFT}%\n&e&lRechter Arm &8&l» &a{Health_ARM_RIGHT}%\n&e&lLinkes Bein &8&l» &a{Health_LEG_LEFT}%\n&e&lRechtes Bein &8&l» &a{Health_LEG_RIGHT}%\n&e&lLinker Fuß &8&l» &a{Health_FOOT_LEFT}%\n&e&lRechter Fuß &8&l» &a{Health_FOOT_RIGHT}%"

      # Message shown on successful health retrieval (given part)
      success-single: '&a{Player}''s {Part} ist bei {Health}%.'

    heal:

      # Message shown for incorrect command usage
      usage: '&bVerwendung: /bodyhealth set [Spieler] [Körperteil] <Wert>'

      # Message shown when no valid target player could be retrieved
      no-target: '&cBitte gib einen Spieler an, wenn du diesen Befehl aus der Konsole ausführst.'

      # Message shown on successful healing
      success-all: '&a{Player} wurde vollständig geheilt.'

      # Message shown on successful healing
      success-single: '&a{Player}''s {Part} wurde vollständig geheilt.'

    reload:

      # Message shown on successful configuration reload
      success: '&aKonfiguration wurde neu geladen.'

      # Message shown if reload fails
      fail: '&cDie Konfiguration konnte nicht neu geladen werden.'

    set:

      # Message shown for incorrect command usage
      usage: '&bVerwendung: /bodyhealth set [Spieler] [Körperteil] <Wert>'

      # Message shown when no valid target player could be retrieved
      no-target: '&cBitte gib einen Spieler an, wenn du diesen Befehl aus der Konsole ausführst.'

      # Message shown if the value provided is invalid
      invalid-value: '&cUngültiger Gesundheitswert: "{Value}".'

      # Message shown on successful health update (all parts)
      success-all: '&aErfolgreich alle Körperteile auf {Value} für {Player} gesetzt.'

      # Message shown on successful health update (given part)
      success-single: '&aErfolgreich {Player}''s {Part} auf {Value} gesetzt.'

    data:

      # Message shown for incorrect command usage
      usage: '&bVerwendung: /bodyhealth data <save/dump/erase/move> [...]'

      save:

        # Message shown on successful save
        success: '&aAlle Daten für {Count} Online-Spieler erfolgreich gespeichert.'

      dump:

        # Message shown for incorrect command usage (dump)
        usage: '&bVerwendung: /bodyhealth data dump <Speichertyp>'

        # Message shown on dump start
        start: '&aSammle und exportiere Daten aus dem {Type}-Speicher von BodyHealth...'

        # Message shown on successful dump
        success: '&aDaten für {Count} Spieler erfolgreich aus dem {Type}-Speicher von BodyHealth nach {File} exportiert.'

        # Message shown if dumping data fails
        fail: '&cFehler beim Exportieren vorhandener Daten aus dem {Type}-Speicher von BodyHealth.'

      erase:

        # Message shown for incorrect command usage (erase)
        usage: '&bVerwendung: /bodyhealth data erase <Speichertyp>'

        # Message used to confirm the erase command
        confirmation: '&c&lWARNUNG: &r&cDu bist dabei, alle vorhandenen Daten aus dem {Type}-Speicher von BodyHealth zu löschen!<br> &eUm fortzufahren, gib diesen Befehl bitte erneut ein.'

        # Message shown on erase start
        start: '&aLösche alle Daten aus dem {Type}-Speicher von BodyHealth...'

        # Message shown on successful erase
        success: '&aAlle Daten aus dem {Type}-Speicher von BodyHealth erfolgreich gelöscht.'

        # Message shown if erasing data fails
        fail: '&cFehler beim Löschen aller Daten aus dem {Type}-Speicher von BodyHealth.'

      move:

        # Message shown for incorrect command usage (move)
        usage: '&bVerwendung: /bodyhealth data move <Speichertyp> <Speichertyp>'

        # Message used to confirm the move command
        confirmation: '&c&lWARNUNG: &r&cDu bist dabei, alle Daten vom {Type1}-Speicher in den {Type2}-Speicher von BodyHealth zu verschieben, wodurch eventuell vorhandene Daten überschrieben werden!<br> &eUm fortzufahren, gib diesen Befehl bitte erneut ein.'

        # Message shown on move start
        start: '&aVerschiebe Daten vom {Type1}-Speicher in den {Type2}-Speicher von BodyHealth...'

        # Message shown on successful move
        success: '&aDaten für {Count} Spieler erfolgreich vom {Type1}-Speicher in den {Type2}-Speicher von BodyHealth verschoben.'

        # Message shown if moving data fails
        fail: '&cFehler beim Verschieben aller vorhandenen Daten vom {Type1}-Speicher in den {Type2}-Speicher von BodyHealth.'


    addon:

      # Message shown for incorrect command usage
      usage: '&bVerwendung: /bodyhealth addon <list/info/enable/disable/reload/load/unload>'

      # Message shown when the specified addon could not be found
      not-found: '&cAddon "{Addon}" wurde nicht gefunden.'

      list:

        # Header shown before listing addons
        header: '&bGeladene Addons ({Count}): '

        # Separator between addon name entries
        separator: '&7, '

        # Entry format for enabled addons
        entry-enabled: '&a{Name}'

        # Entry format for disabled addons
        entry-disabled: '&c{Name}'

        # Message shown when no addons are loaded
        none: '&7Keine Addons geladen.'

      info:

        # Message shown for incorrect command usage
        usage: '&bVerwendung: /bodyhealth addon info <addon>'

        # Message shown to display addon information
        display: "&bAddon-Info für &f{Name}&b:\n&bBeschreibung: &f{Description}\n&bAutor: &f{Author}\n&bVersion: &f{Version}\n&bStatus: {Status}"

        # Label for an enabled addon status
        status-enabled: '&aAktiviert'

        # Label for a disabled addon status
        status-disabled: '&cDeaktiviert'

      enable:

        # Message shown for incorrect command usage
        usage: '&bVerwendung: /bodyhealth addon enable <addon>'

        # Message shown if the addon is already enabled
        already-enabled: '&cAddon "{Addon}" ist bereits aktiviert.'

        # Message shown on successful enable
        success: '&aAddon "{Addon}" wurde aktiviert.'

        # Message shown if enabling fails
        fail: '&cAddon "{Addon}" konnte nicht aktiviert werden.'

      disable:

        # Message shown for incorrect command usage
        usage: '&bVerwendung: /bodyhealth addon disable <addon>'

        # Message shown if the addon is already disabled
        already-disabled: '&cAddon "{Addon}" ist bereits deaktiviert.'

        # Message shown on successful disable
        success: '&aAddon "{Addon}" wurde deaktiviert.'

        # Message shown if disabling fails
        fail: '&cAddon "{Addon}" konnte nicht deaktiviert werden.'

      reload:

        # Message shown for incorrect command usage
        usage: '&bVerwendung: /bodyhealth addon reload <addon>'

        # Message shown on successful reload
        success: '&aAddon "{Addon}" wurde neu geladen.'

        # Message shown if reloading fails
        fail: '&cAddon "{Addon}" konnte nicht neu geladen werden.'

      load:

        # Message shown for incorrect command usage
        usage: '&bVerwendung: /bodyhealth addon load <Datei>'

        # Message shown when the specified addon file could not be found
        not-found: '&cAddon-Datei "{File}" wurde nicht im Addons-Verzeichnis gefunden.'

        # Warning shown before loading an addon post onLoad (requires confirmation)
        warning: '&c&lWARNUNG: &r&cManuelles Laden von Addons wird möglicherweise nicht von jedem Addon unterstützt!<br> &eUm fortzufahren, gib diesen Befehl bitte erneut ein.'

        # Message shown if the addon is already loaded
        already-loaded: '&cAddon aus "{File}" ist bereits geladen.'

        # Message shown on successful load
        success: '&aAddon aus "{File}" wurde erfolgreich geladen.'

        # Message shown if loading fails
        fail: '&cAddon aus "{File}" konnte nicht geladen werden.'

      unload:

        # Message shown for incorrect command usage
        usage: '&bVerwendung: /bodyhealth addon unload <addon>'

        # Warning shown before unloading an addon (requires confirmation)
        warning: '&c&lWARNUNG: &r&cManuelles Entladen von Addons wird möglicherweise nicht von jedem Addon unterstützt!<br> &eUm fortzufahren, gib diesen Befehl bitte erneut ein.'

        # Message shown on successful unload
        success: '&aAddon "{Addon}" wurde erfolgreich entladen.'

        # Message shown if unloading fails
        fail: '&cAddon "{Addon}" konnte nicht entladen werden.'

    debug:

      # Message shown for incorrect command usage
      usage: '&bVerwendung: /bodyhealth debug <dump/toggle> [...]'

      dump:

        # Message shown on dump start
        start: '&aSammle und exportiere Debug-Informationen...'

        # Message shown on successful dump
        success: '&aDebug-Informationen erfolgreich nach {File} exportiert.'

        # Message shown if dumping data fails
        fail: '&cFehler beim Exportieren der Debug-Informationen!'

      toggle:

        # Message shown for toggling on debug mode
        normal-on: '&aDebug-Modus aktiviert.'

        # Message shown for toggling off debug mode
        normal-off: '&aDebug-Modus deaktiviert.'

        # Message shown for toggling on verbose (development) mode
        verbose-on: '&aEntwicklungsmodus aktiviert.'

        # Message shown for toggling off verbose (development) mode
        verbose-off: '&aEntwicklungsmodus deaktiviert.'